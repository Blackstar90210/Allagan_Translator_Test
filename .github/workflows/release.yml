name: Publish Release

on:
  push:
    tags:
      - 'v*' # Si attiva solo quando invii un tag che inizia con "v" (es. v1.0.0.7)

jobs:
  release:
    name: Create GitHub Release
    runs-on: windows-latest
    permissions:
      contents: write # Serve il permesso per scrivere la release
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          
      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:RUNNER_TEMP\dalamud"
          
      - name: Build Plugin
        run: dotnet build -c Release
        env:
          DALAMUD_HOME: ${{ runner.temp }}\dalamud
        
      - name: Pack Latest Zip
        run: |
          Copy-Item "bin/Release/AllaganTranslator/latest.zip" "latest.zip" -Force
          # Inietta l'icona e le librerie Vulkan
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::Open("latest.zip", 'Update')
          [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, "images/icon.png", "icon.png")
          
          $vulkanDir = "bin/Release/runtimes/win-x64/native/vulkan"
          if (Test-Path $vulkanDir) {
              Get-ChildItem $vulkanDir | ForEach-Object {
                  $entryName = "runtimes/win-x64/native/vulkan/" + $_.Name
                  [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $_.FullName, $entryName)
              }
          }
          
          $zip.Dispose()
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.zip
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
